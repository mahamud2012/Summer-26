<html>
<head>
    <title>Welcome to Pental Shop</title>
      <link rel="stylesheet" href="pertanshop.css">
    <style>
        
    </style>
</head>
<body>

    <h1>Welcome to Pental Shop</h1>

    <div class="about-section">
        <h2>About This Lab</h2>
        <p>In this lab, you will learn basic HTML structure, formatting text, creating simple tables, and using forms for input.</p>
    </div>

    <table>
        
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>

        

            <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>
            <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>
            <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>
       
    </table>

    <div class="contact-box">
        <h2>Contact Information</h2>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>
        </div>

        <button class="submit-btn" type="button">Submit</button>
    </div>

</body>
</html>
